openapi: 3.0.3
info:
  title: JAQ Studio API
  version: 1.0.0
  description: Documentacao da API do JAQ Studio.
paths:
  /api/audit/logs/:
    get:
      operationId: audit_logs_list
      summary: List action logs
      parameters:
      - in: query
        name: action
        schema:
          type: string
        description: Action name.
      - in: query
        name: actor
        schema:
          type: integer
        description: Actor user ID.
      - in: query
        name: entity_id
        schema:
          type: string
        description: Entity ID.
      - in: query
        name: entity_type
        schema:
          type: string
        description: Entity type.
      - in: query
        name: module
        schema:
          type: string
        description: Module name.
      - name: page
        required: false
        in: query
        description: Um número de página dentro do conjunto de resultados paginado.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Número de resultados a serem retornados por página.
        schema:
          type: integer
      - in: query
        name: q
        schema:
          type: string
        description: Search in description or entity repr.
      tags:
      - Audit
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedActionLogList'
          description: ''
  /api/audit/logs/{id}/:
    get:
      operationId: audit_logs_retrieve
      summary: Retrieve action log
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este Action log.
        required: true
      tags:
      - Audit
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionLog'
          description: ''
  /api/auth/access/:
    get:
      operationId: auth_access_retrieve
      summary: Access matrix for authenticated user
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessMatrix'
          description: ''
        '401':
          description: Nao autenticado.
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      summary: Login com email e senha
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
            examples:
              LoginRequest:
                value:
                  email: usuario@jaqstudio.local
                  password: PASSWORD
                summary: Login request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                LoginResponse:
                  value:
                    access: <jwt_access>
                    refresh: <jwt_refresh>
                    user:
                      id: 1
                      email: usuario@jaqstudio.local
                      first_name: Admin
                      last_name: JAQ
                      role: ADMIN
                      is_active: true
                      photo_bytes: null
                  summary: Login response
          description: ''
        '401':
          description: Credenciais invalidas.
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      summary: Dados do usuario autenticado
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                MeResponse:
                  value:
                    id: 1
                    email: usuario@jaqstudio.local
                    first_name: Admin
                    last_name: JAQ
                    role: ADMIN
                    is_active: true
                    photo_bytes: null
                  summary: Me response
          description: ''
        '401':
          description: Nao autenticado.
    patch:
      operationId: auth_me_partial_update
      summary: Atualizar proprio usuario
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserMeUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserMeUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserMeUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '400':
          description: Payload invalido.
        '401':
          description: Nao autenticado.
  /api/auth/me/photo/:
    patch:
      operationId: auth_me_photo_partial_update
      summary: Atualizar foto do proprio usuario
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserPhotoUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserPhotoUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserPhotoUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '401':
          description: Nao autenticado.
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      summary: Renovar token de acesso
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
            examples:
              RefreshRequest:
                value:
                  refresh: <jwt_refresh>
                summary: Refresh request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResponse'
              examples:
                RefreshResponse:
                  value:
                    access: <new_jwt_access>
                  summary: Refresh response
          description: ''
        '401':
          description: Refresh token invalido/expirado.
  /api/auth/register/:
    post:
      operationId: auth_register_create
      summary: Registrar usuario
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '400':
          description: Payload invalido.
  /api/auth/users/:
    get:
      operationId: auth_users_list
      summary: Listar usuarios
      parameters:
      - name: page
        required: false
        in: query
        description: Um número de página dentro do conjunto de resultados paginado.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Número de resultados a serem retornados por página.
        schema:
          type: integer
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserList'
          description: ''
        '401':
          description: Nao autenticado.
        '403':
          description: Sem permissao.
  /api/auth/users/{id}/:
    get:
      operationId: auth_users_retrieve
      summary: Detalhar usuario por id
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '401':
          description: Nao autenticado.
        '403':
          description: Sem permissao.
        '404':
          description: Usuario nao encontrado.
    put:
      operationId: auth_users_update
      summary: Substituir usuario por id
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminUserUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminUserUpdate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '400':
          description: Payload invalido.
        '401':
          description: Nao autenticado.
        '403':
          description: Sem permissao.
        '404':
          description: Usuario nao encontrado.
    patch:
      operationId: auth_users_partial_update
      summary: Atualizar usuario por id
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAdminUserUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAdminUserUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAdminUserUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '400':
          description: Payload invalido.
        '401':
          description: Nao autenticado.
        '403':
          description: Sem permissao.
        '404':
          description: Usuario nao encontrado.
