  /api/briefings/contract-drafts/{id}/promote-to-contract/:
    post:
      operationId: briefings_contract_drafts_promote_to_contract_create
      summary: Promover minuta em contrato formal
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este contract draft.
        required: true
      tags:
